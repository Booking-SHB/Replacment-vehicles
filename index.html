<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام السيارات البديلة</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;--bg2:#ffffff;--bg3:#f0f1f5;--bg4:#e8eaf0;
  --text:#1a1d2e;--text2:#555a7a;--text3:#8b91b0;
  --border:#dde0ed;--border2:#c8ccde;
  --purple:#3d35c4;--purple2:#2e28a0;--purple-light:#eae9f8;
  --green:#0a7a52;--green-bg:#e6f5ef;
  --red:#c0392b;--red-bg:#fcecea;
  --amber:#92600a;--amber-bg:#fef5e4;
  --blue:#1a5fa5;--blue-bg:#e6f0fb;
  --radius:10px;--radius-lg:14px;--radius-xl:20px;
}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}


/* NOTIFICATIONS */
.notif-btn{position:relative;background:none;border:1px solid var(--border2);color:var(--text2);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.notif-btn:hover{border-color:var(--purple);color:var(--purple)}
.notif-count{position:absolute;top:-4px;left:-4px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:20px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.notif-dropdown{position:fixed;top:60px;left:20px;width:320px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 8px 32px rgba(0,0,0,0.15);z-index:300;max-height:400px;overflow-y:auto}
.notif-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{border-right:3px solid var(--purple)}
.notif-item-title{font-size:13px;font-weight:500;margin-bottom:3px}
.notif-item-body{font-size:11px;color:var(--text2)}
.notif-item-time{font-size:10px;color:var(--text3);margin-top:4px}
.notif-empty{padding:24px;text-align:center;color:var(--text3);font-size:13px}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:100}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-xl);padding:40px;width:min(420px,90vw);text-align:center}
.login-logo{font-size:32px;margin-bottom:8px}
.login-title{font-size:20px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.login-box input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:inherit;margin-bottom:10px;text-align:right}
.login-box input:focus{outline:none;border-color:var(--purple)}
.btn-login{width:100%;padding:12px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.2s}
.btn-login:hover{background:var(--purple2)}
.login-error{color:var(--red);font-size:12px;margin-top:8px;display:none}
.demo-accounts{margin-top:20px;background:var(--bg3);border-radius:var(--radius);padding:14px;text-align:right}
.demo-accounts p{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500}
.demo-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);color:var(--text3)}
.demo-row:last-child{border:none}
.demo-row span:first-child{color:var(--text)}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header-logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}
.header-logo span{color:var(--purple)}
.header-user{display:flex;align-items:center;gap:10px}
.user-badge{background:var(--purple-light);color:var(--purple);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.btn-logout{background:none;border:1px solid var(--border2);color:var(--text2);padding:5px 12px;border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:inherit}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:220px;background:var(--bg2);border-left:1px solid var(--border);padding:16px 0;flex-shrink:0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);transition:all 0.15s;font-size:13px;border-right:3px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--purple);border-right-color:var(--purple)}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-right:auto;background:var(--red);color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.main{flex:1;padding:24px;overflow-y:auto}

/* CARDS */
.page-title{font-size:20px;font-weight:600;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.stat-num{font-size:28px;font-weight:600;margin-bottom:4px}
.stat-lbl{font-size:12px;color:var(--text2)}
.stat-card.green .stat-num{color:var(--green)}
.stat-card.red .stat-num{color:var(--red)}
.stat-card.amber .stat-num{color:var(--amber)}
.stat-card.purple .stat-num{color:var(--purple)}

/* TABLE */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.table-title{font-size:14px;font-weight:500}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:right;padding:10px 16px;font-size:12px;color:var(--text3);font-weight:500;background:var(--bg3);border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.badge.green{background:var(--green-bg);color:var(--green)}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.blue{background:var(--blue-bg);color:var(--blue)}
.badge.purple{background:var(--purple-light);color:var(--purple)}
.badge.gray{background:var(--bg3);color:var(--text2)}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--border2);background:var(--bg4)}
.btn.primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn.primary:hover{background:var(--purple2)}
.btn.success{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.btn.danger{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.btn.sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-xl);padding:24px;width:min(560px,100%);max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600}
.close-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0;line-height:1}
.close-btn:hover{color:var(--text)}

/* FORM */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.form-control{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:inherit;transition:border 0.15s}
.form-control:focus{outline:none;border-color:var(--purple)}
textarea.form-control{height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}

/* CHECKLIST */
.checklist{background:var(--bg3);border-radius:var(--radius);padding:12px;margin-bottom:14px}
.checklist-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px}
.check-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.check-item:last-child{border:none}
.check-item input{accent-color:var(--purple);width:15px;height:15px;cursor:pointer}

/* TIMELINE */
.timeline{padding:0}
.tl-item{display:flex;gap:14px;padding-bottom:20px;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;right:17px;top:32px;bottom:0;width:1px;background:var(--border)}
.tl-dot{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid}
.tl-dot.done{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.tl-dot.pending{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.tl-dot.waiting{background:var(--bg3);border-color:var(--border2);color:var(--text3)}
.tl-dot.rejected{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.tl-content{flex:1}
.tl-title{font-size:13px;font-weight:500;margin-bottom:3px}
.tl-meta{font-size:11px;color:var(--text3)}
.tl-note{font-size:12px;color:var(--text2);margin-top:4px;background:var(--bg3);padding:6px 10px;border-radius:var(--radius);border-right:2px solid var(--border2)}

/* ALERT */
.alert{padding:10px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.alert.success{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.alert.error{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.alert.info{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue)}

/* EMPTY */
.empty{text-align:center;padding:48px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}

/* CAR GRID */
.car-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.car-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:border 0.15s}
.car-card:hover{border-color:var(--border2)}
.car-card.available{border-top:3px solid var(--green)}
.car-card.busy{border-top:3px solid var(--red)}
.car-plate{font-size:16px;font-weight:600;margin-bottom:4px}
.car-model{font-size:12px;color:var(--text2);margin-bottom:10px}
.car-meta{font-size:11px;color:var(--text3);margin-top:6px}

/* APPROVAL CARD */
.approval-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:12px}
.approval-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.approval-client{font-size:15px;font-weight:600}
.approval-meta{font-size:12px;color:var(--text2);margin-top:3px}
.approval-actions{display:flex;gap:8px;margin-top:14px}

/* RESPONSIVE */
@media(max-width:640px){
  .sidebar{display:none}
  .form-row{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}

.sep{height:1px;background:var(--border);margin:16px 0}
.text-muted{color:var(--text2)}
.text-sm{font-size:12px}
.mt-4{margin-top:16px}
.flex{display:flex}.gap-2{gap:8px}.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-wrap{flex-wrap:wrap}
</style>
</head>

// ── DB SETUP ──

// ── AUTH ──
function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-name').textContent = currentUser.name;
  renderSidebar();
  navigate('dashboard');
  loadNotifications();
}

async function doLogin(){
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  // Try DB first
  const {data:dbUser} = await sb.from('lc_users').select('*').eq('username',u).eq('password',p).eq('is_active',true).single();
  if(dbUser){
    const roleMap = {staff:'موظف',auditor:'مدقق',supervisor:'مشرف',manager:'مدير'};
    currentUser = {name:dbUser.name, role:dbUser.role, roleAr:roleMap[dbUser.role]||dbUser.role, username:dbUser.username, email:dbUser.email};
    localStorage.setItem('lc_user', JSON.stringify(currentUser));
    document.getElementById('login-error').style.display='none';
    showApp();
  } else if(USERS[u] && p === '1234'){
    // Fallback to hardcoded
    currentUser = {...USERS[u], username: u};
    localStorage.setItem('lc_user', JSON.stringify(currentUser));
    document.getElementById('login-error').style.display='none';
    showApp();
  } else {
    document.getElementById('login-error').style.display='block';
  }
}

function doLogout(){
  localStorage.removeItem('lc_user');
  currentUser = null;
  showLogin();
}

function renderSidebar(){
  const items = NAV_ITEMS[currentUser.role] || [];
  document.getElementById('sidebar').innerHTML = items.map(k => `
    <div class="nav-item ${currentPage===k?'active':''}" onclick="navigate('${k}')" id="nav-${k}">
      <span class="nav-icon">${NAV_LABELS[k].icon}</span>
      <span>${NAV_LABELS[k].label}</span>
    </div>
  `).join('');
}

async function navigate(page){
  currentPage = page;
  renderSidebar();
  const content = document.getElementById('page-content');
  content.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3)"><div class="spinner" style="margin:0 auto 12px"></div>جاري التحميل...</div>`;
  await renderPage(page);
}

// ── PAGES ──
async function renderPage(page){
  const c = document.getElementById('page-content');
  if(page==='dashboard') await renderDashboard(c);
  else if(page==='cars') await renderCars(c);
  else if(page==='new_request') renderNewRequest(c);
  else if(page==='my_requests') await renderRequests(c,'my');
  else if(page==='pending_audit') await renderRequests(c,'pending_audit');
  else if(page==='pending_supervisor') await renderRequests(c,'pending_supervisor');
  else if(page==='pending_manager') await renderRequests(c,'pending_manager');
  else if(page==='all_requests') await renderRequests(c,'all');
  else if(page==='users') renderUsers(c);
  else if(page==='manage_cars') renderManageCars(c);
  else if(page==='settings') renderSettings(c);
}

// ── DASHBOARD ──
async function renderDashboard(c){
  const {data:cars} = await sb.from('lc_cars').select('*');
  const {data:reqs} = await sb.from('lc_requests').select('*');
  const carsData = cars||[];
  const reqsData = reqs||[];
  const avail = carsData.filter(x=>x.status==='available').length;
  const busy = carsData.filter(x=>x.status==='busy').length;
  const maintenance = carsData.filter(x=>x.status==='maintenance').length;
  const pending = reqsData.filter(x=>['draft','pending_audit','pending_supervisor','pending_manager','pending_close'].includes(x.status)).length;
  const approved = reqsData.filter(x=>x.status==='approved').length;

  c.innerHTML = `
    <div class="page-title">مرحباً، ${currentUser.name} 👋</div>
    <div class="stats-grid">
      <div class="stat-card green"><div class="stat-num">${avail}</div><div class="stat-lbl">سيارات متاحة</div></div>
      <div class="stat-card red"><div class="stat-num">${busy}</div><div class="stat-lbl">سيارات مُسلَّمة</div></div>
      <div class="stat-card amber"><div class="stat-num">${maintenance}</div><div class="stat-lbl">سيارات في الصيانة</div></div>
      <div class="stat-card purple"><div class="stat-num">${pending}</div><div class="stat-lbl">طلبات قيد المراجعة</div></div>
    </div>
    ${pending>0?`<div class="alert info">⏳ يوجد ${pending} طلب بانتظار المراجعة</div>`:''}
    <div class="table-card">
      <div class="table-header"><span class="table-title">آخر الطلبات</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>العميل</th><th>السيارة البديلة</th><th>تاريخ الطلب</th><th>الحالة</th></tr></thead>
          <tbody>
            ${reqsData.slice(-5).reverse().map(r=>`
              <tr class="req-row" data-info="${(r.client_name||'')+'|'+( r.service_order||'')+'|'+( r.status||'')}">
                <td><strong>${r.client_name||'—'}</strong></td>
                <td>${r.car_plate||'—'}</td>
                <td>${r.created_at?r.created_at.split('T')[0]:'—'}</td>
                <td>${statusBadge(r.status)}</td>
              </tr>
            `).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">لا توجد طلبات بعد</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function renderRequests(c, filter){
  let query = sb.from('lc_requests').select('*').order('created_at',{ascending:false});
  if(filter==='my') query = query.eq('created_by', currentUser.username);
  else if(filter==='pending_audit') query = query.eq('status','pending_audit');
  else if(filter==='pending_supervisor') query = query.eq('status','pending_supervisor');
  else if(filter==='pending_manager') query = query.eq('status','pending_manager');

  const {data:reqs} = await query;
  const reqsData = reqs||[];

  const titles = {
    my:'طلباتي', pending_audit:'بانتظار التدقيق',
    pending_supervisor:'بانتظار موافقة المشرف',
    pending_manager:'بانتظار موافقة المدير', all:'جميع الطلبات'
  };

  c.innerHTML = `
    <div class="flex justify-between items-center" style="margin-bottom:20px">
      <div class="page-title" style="margin:0">${titles[filter]}</div>
      ${filter==='my'?`<button class="btn primary" onclick="navigate('new_request')">➕ طلب جديد</button>`:''}

async function submitRequest(){
  const client = document.getElementById('f_client')?.value.trim();
  const clientId = document.getElementById('f_id')?.value.trim();
  const phone = document.getElementById('f_phone')?.value.trim();
  const carVal = document.getElementById('f_car')?.value;
  const so = document.getElementById('f_so')?.value.trim();

  if(!client||!phone||!carVal||!so){
    showAlert('يرجى ملء جميع الحقول الإلزامية (*)','error'); return;
  }

  // Check required docs
  const requiredDocs = ['doc1','doc2','doc3','doc4','doc6'];
  for(const id of requiredDocs){
    if(!document.getElementById(id)?.files[0]){
      const names = {'doc1':'أمر الشغل','doc2':'هوية العميل','doc3':'رخصة سير العميل','doc4':'رخصة سير المركبة','doc6':'نموذج التفويض'};
      showAlert('يرجى رفع المستند: '+names[id],'error'); return;
    }
  }

  const [carId, carPlate, carModel, carYear] = carVal.split('|');

  // Upload files to Supabase Storage
  const docNames = {'doc1':'أمر الشغل','doc2':'هوية العميل','doc3':'رخصة سير العميل','doc4':'رخصة سير المركبة','doc5':'إثبات عدم مخالفات','doc6':'نموذج التفويض'};
  const uploadedDocs = [];
  const uploadedUrls = {};
  const progress = document.getElementById('upload-progress');
  if(progress) progress.style.display='block';

  for(const docId of ['doc1','doc2','doc3','doc4','doc5','doc6']){
    const file = document.getElementById(docId)?.files[0];
    if(!file) continue;
    const fileName = so+'_'+docId+'_'+Date.now()+'.pdf';
    const {data:upData, error:upErr} = await sb.storage.from('Documents').upload(fileName, file, {upsert:true});
    if(upErr){ showAlert('خطأ في رفع '+docNames[docId]+': '+upErr.message,'error'); return; }
    uploadedDocs.push(docNames[docId]);
    uploadedUrls[docNames[docId]] = fileName;
  }
  if(progress) progress.style.display='none';

  const checkedDocs = uploadedDocs;

  const payload = {
    client_name: client,
    client_id: clientId,
    client_phone: phone,
    client_city: document.getElementById('f_city')?.value||'',
    service_order: so,
    maintenance_car: document.getElementById('f_mcar')?.value||'',
    car_id: carId,
    car_plate: carPlate,
    car_model: carModel,
    car_year: carYear||'',
    delivery_date: document.getElementById('f_del')?.value||'',
    return_date: document.getElementById('f_ret')?.value||'',
    delivery_km: parseInt(document.getElementById('f_km')?.value)||0,
    delivery_fuel: parseInt(document.getElementById('f_fuel')?.value)||0,
    notes: document.getElementById('f_notes')?.value||'',
    docs: checkedDocs,
    doc_urls: uploadedUrls,
    status: 'pending_audit',
    created_by: currentUser.username,
    created_by_name: currentUser.name,
    workflow: [{
      step:'created', by: currentUser.name,
      at: new Date().toISOString(), note:'تم رفع الطلب'
    }]
  };

  const {error} = await sb.from('lc_requests').insert(payload);
  if(error){
    // Table might not exist, create it
    await createTablesAndRetry(payload);
    return;
  }

  // Mark car as busy
  await sb.from('lc_cars').update({status:'busy', assigned_to: client}).eq('id', carId);
  // Notify auditor
  await sendNotification('auditor', '📋 طلب تفويض جديد بانتظار تدقيقك', 'طلب جديد للعميل '+client+' — أمر الخدمة: '+so, null);
  showAlert('تم إرسال الطلب للتدقيق بنجاح ✓','success');
  navigate('my_requests');
}

async function createTablesAndRetry(payload){
  // Try creating tables via SQL
  const sql = `
    CREATE TABLE IF NOT EXISTS lc_cars (
      id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
      plate text NOT NULL, model text, color text,
      status text DEFAULT 'available', km integer DEFAULT 0,
      assigned_to text, created_at timestamptz DEFAULT now()
    );
    CREATE TABLE IF NOT EXISTS lc_requests (
      id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
      client_name text, client_id text, client_phone text, client_city text,
      service_order text, maintenance_car text,
      car_id uuid, car_plate text, car_model text,
      delivery_date text, return_date text,
      delivery_km integer DEFAULT 0, delivery_fuel integer DEFAULT 0,
      notes text, docs jsonb DEFAULT '[]',
      status text DEFAULT 'pending_audit',
      created_by text, created_by_name text,
      workflow jsonb DEFAULT '[]',
      created_at timestamptz DEFAULT now()
    );
  `;
  const {error:sqlErr} = await sb.rpc('exec_sql', {sql});

  // Try direct insert anyway
  const {error} = await sb.from('lc_requests').insert(payload);
  if(error){
    showAlert('⚠️ يرجى إنشاء الجداول أولاً من لوحة Supabase. اضغط "إعداد قاعدة البيانات" في الأسفل.','error');
    document.getElementById('page-content').insertAdjacentHTML('beforeend',`
      <div class="mt-4">
        <button class="btn primary" onclick="showDbSetup()">🗄️ إعداد قاعدة البيانات</button>
      </div>
    `);
    return;
  }
  await sb.from('lc_cars').update({status:'busy', assigned_to: payload.client_name}).eq('id', payload.car_id);
  showAlert('تم إرسال الطلب للتدقيق بنجاح ✓','success');
  navigate('my_requests');
}

function renderTimeline(status, wf){
  const steps = [
    {key:'created', label:'رفع الطلب', role:'موظف'},
    {key:'pending_audit', label:'التدقيق', role:'مدقق'},
    {key:'pending_supervisor', label:'موافقة المشرف', role:'مشرف'},
    {key:'pending_manager', label:'موافقة المدير', role:'مدير'},
    {key:'approved', label:'اعتماد نهائي', role:''},
  ];
  const statusOrder = ['created','pending_audit','pending_supervisor','pending_manager','approved'];
  const currentIdx = statusOrder.indexOf(status==='rejected'?'pending_audit':status);

  return steps.map((step,i)=>{
    const wfEntry = wf.find(w=>w.step===step.key);
    let dotClass = 'waiting';
    if(status==='rejected' && i===currentIdx) dotClass='rejected';
    else if(i < currentIdx || status==='approved') dotClass='done';
    else if(i===currentIdx) dotClass='pending';

    return `<div class="tl-item">
      <div class="tl-dot ${dotClass}">${dotClass==='done'?'✓':dotClass==='pending'?'⏳':dotClass==='rejected'?'✕':'○'}</div>
      <div class="tl-content">
        <div class="tl-title">${step.label} ${step.role?`<span class="text-muted text-sm">(${step.role})</span>`:''}</div>
        <div class="tl-meta">${wfEntry?`${wfEntry.by} · ${wfEntry.at?wfEntry.at.split('T')[0]:''}`:dotClass==='waiting'?'في الانتظار':dotClass==='pending'?'قيد المراجعة':''}</div>
        ${wfEntry&&wfEntry.note?`<div class="tl-note">${wfEntry.note}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

async function approveRequest(id){
  const {data:req} = await sb.from('lc_requests').select('*').eq('id',id).single();
  const note = document.getElementById('action-note')?.value||'';
  const wf = req.workflow||[];
  const nextStatus = {
    pending_audit:'pending_supervisor',
    pending_supervisor:'pending_manager',
    pending_manager:'approved'
  }[req.status];

  wf.push({step:req.status, by:currentUser.name, at:new Date().toISOString(), action:'approved', note});
  await sb.from('lc_requests').update({status:nextStatus, workflow:wf}).eq('id',id);
  // Send notification to next role
  const nextRoleMap = {pending_supervisor:'supervisor', pending_manager:'manager', approved:'staff'};
  const nextRole = nextRoleMap[nextStatus];
  const notifTitles = {supervisor:'طلب بانتظار موافقتك', manager:'طلب بانتظار موافقتك', staff:'تمت الموافقة على طلبك'};
  if(nextRole) await sendNotification(nextRole, notifTitles[nextRole]||'إشعار جديد', 'طلب تفويض للعميل '+req.client_name+' — أمر الخدمة: '+req.service_order, id);
  closeModal();
  showAlert('تمت الموافقة وإحالة الطلب للمرحلة التالية ✓','success');
  navigate(currentPage);
}

async function rejectRequest(id){
  const {data:req} = await sb.from('lc_requests').select('*').eq('id',id).single();
  const note = document.getElementById('action-note')?.value||'يرجى مراجعة البيانات';
  const wf = req.workflow||[];
  wf.push({step:req.status, by:currentUser.name, at:new Date().toISOString(), action:'rejected', note});
  await sb.from('lc_requests').update({status:'rejected', workflow:wf}).eq('id',id);
  if(req.car_id) await sb.from('lc_cars').update({status:'available', assigned_to:null}).eq('id',req.car_id);
  // Notify the staff who created the request
  await sendNotification('staff', '❌ تم رفض طلبك', 'طلب تفويض العميل '+req.client_name+' — '+req.service_order+' — السبب: '+(note||'يرجى المراجعة'), id);
  closeModal();
  showAlert('تم رفض الطلب وإعادة السيارة إلى المتاح','error');
  navigate(currentPage);
}

async function saveCar(){
  const plate = document.getElementById('nc_plate')?.value.trim();
  const model = document.getElementById('nc_model')?.value.trim();
  if(!plate||!model){showAlert('يرجى ملء رقم اللوحة والموديل','error');return;}
  const {error} = await sb.from('lc_cars').insert({
    plate, model,
    color: document.getElementById('nc_color')?.value||'',
    km: parseInt(document.getElementById('nc_km')?.value)||0,
    year: parseInt(document.getElementById('nc_year')?.value)||null,
    status: document.getElementById('nc_status')?.value||'available',
    notes: document.getElementById('nc_notes')?.value||''
  });
  if(error){showAlert('خطأ في الحفظ: '+error.message,'error');return;}
  closeModal();
  showAlert('تم إضافة السيارة بنجاح ✓','success');
  navigate('cars');
}

function openDocsModal(docsArr, docUrls, reqId){
  if(typeof docUrls === 'string'){ reqId = docUrls; docUrls = {}; }
  docUrls = docUrls || {};
  const allDocs = [
    'أمر الشغل','هوية العميل','رخصة سير العميل',
    'رخصة سير المركبة','إثبات عدم مخالفات',
    'نموذج التفويض'
  ];
  let rows = '';
  let uploadedCount = 0;
  for(const doc of allDocs){
    const filePath = docUrls[doc] || null;
    const hasFile = filePath !== null;
    if(hasFile) uploadedCount++;
    const borderColor = hasFile ? '#0a7a52' : '#dde0ed';
    const bgColor = hasFile ? '#e6f5ef' : '#f5f6fa';
    let btn = '';
    if(hasFile){
      const safePath = filePath.replace(/'/g, "\'");
      btn = '<button style="padding:4px 12px;background:#0a7a52;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit" onclick="viewDoc(\''+safePath+'\')">👁️ عرض</button>';
    } else {
      btn = '<span style="font-size:11px;padding:3px 9px;border-radius:20px;background:#fcecea;color:#c0392b">✗ غير مرفق</span>';
    }
    rows += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;margin-bottom:6px;border:1px solid '+borderColor+';background:'+bgColor+'">'
          + '<span style="font-size:13px">'+doc+'</span>'
          + btn
          + '</div>';
  }
  const total = allDocs.length;
  const pct = Math.round(uploadedCount/total*100);
  const countColor = uploadedCount===total ? '#0a7a52' : uploadedCount>=4 ? '#92600a' : '#c0392b';
  window._modalReqId = reqId;
  const html = '<div class="modal-overlay" style="z-index:300;position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;padding:16px">'
    + '<div style="background:#fff;border-radius:14px;padding:24px;width:min(440px,100%);max-height:90vh;overflow-y:auto;border:1px solid #dde0ed">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    + '<span style="font-size:16px;font-weight:600">📎 المستندات المرفقة</span>'
    + '<button style="background:none;border:none;font-size:22px;cursor:pointer;color:#555" onclick="window._modalReqId&&(closeModal(),openRequestDetail(window._modalReqId))">×</button>'
    + '</div>'
    + rows
    + '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f0f1f5;border-radius:8px;margin-top:4px">'
    + '<span style="font-size:13px;color:#555">المستندات المرفوعة</span>'
    + '<span style="font-weight:600;color:'+countColor+'">'+uploadedCount+' / '+total+'</span>'
    + '</div>'
    + '<div style="margin-top:14px;display:flex;justify-content:flex-end">'
    + '<button style="padding:8px 18px;background:#3d35c4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit" onclick="window._modalReqId&&(closeModal(),openRequestDetail(window._modalReqId))">رجوع للطلب</button>'
    + '</div>'

}


async function viewDoc(filePath){
  if(!filePath){ showAlert('مسار الملف غير صحيح','error'); return; }
  // Try signed URL first (private bucket)
  const {data, error} = await sb.storage.from('Documents').createSignedUrl(filePath, 3600);
  if(error){
    // Fallback: try download
    const {data:dlData, error:dlErr} = await sb.storage.from('Documents').download(filePath);
    if(dlErr){ showAlert('تعذر فتح الملف: '+dlErr.message,'error'); return; }
    const url = URL.createObjectURL(dlData);
    window.open(url, '_blank');
    return;
  }
  window.open(data.signedUrl, '_blank');
}

let notifVisible = false;

async function loadNotifications(){
  if(!currentUser) return;
  const {data} = await sb.from('lc_notifications')
    .select('*').eq('to_role', currentUser.role)
    .order('created_at',{ascending:false}).limit(20);
  const unread = (data||[]).filter(n=>!n.is_read).length;
  const countEl = document.getElementById('notif-count');
  if(countEl){
    countEl.textContent = unread;
    countEl.style.display = unread > 0 ? 'flex' : 'none';
  }
  return data||[];
}

function toggleNotifications(){
  const panel = document.getElementById('notif-panel');
  notifVisible = !notifVisible;
  panel.style.display = notifVisible ? 'block' : 'none';
  if(notifVisible) renderNotifPanel();
  if(notifVisible){
    setTimeout(()=>{
      document.addEventListener('click', function closeNotif(e){
        if(!panel.contains(e.target) && e.target.id!=='notif-btn'){
          panel.style.display='none'; notifVisible=false;
          document.removeEventListener('click', closeNotif);
        }
      });
    }, 100);
  }
}

async function renderNotifPanel(){
  const panel = document.getElementById('notif-panel');
  panel.innerHTML = '<div class="notif-header"><span>🔔 الإشعارات</span><button class="btn sm" onclick="markAllRead()">قراءة الكل</button></div><div style="padding:12px;text-align:center;color:var(--text3);font-size:12px">⏳ جاري التحميل...</div>';
  const data = await loadNotifications();
  if(!data||data.length===0){
    panel.innerHTML = '<div class="notif-header"><span>🔔 الإشعارات</span><button class="btn sm" onclick="markAllRead()">قراءة الكل</button></div><div class="notif-empty">لا توجد إشعارات</div>';
    return;
  }
  const items = data.map(n=>{
    const rid = n.request_id||'';
    return '<div class="notif-item '+(n.is_read?'':'unread')+'" onclick="openNotif(\'' + n.id + '\',\'' + rid + '\')">'
      + '<div class="notif-item-title">'+(n.title||'')+'</div>'
      + '<div class="notif-item-body">'+(n.body||'')+'</div>'
      + '<div class="notif-item-time">'+(n.created_at?new Date(n.created_at).toLocaleString('ar-SA'):'—')+'</div>'
      + '</div>';
  }).join('');
  panel.innerHTML = '<div class="notif-header"><span>🔔 الإشعارات</span><button class="btn sm" onclick="markAllRead()">قراءة الكل</button></div>'+items;
}

async function openNotif(notifId, requestId){
  await sb.from('lc_notifications').update({is_read:true}).eq('id',notifId);
  loadNotifications();
  document.getElementById('notif-panel').style.display='none';
  notifVisible=false;
  if(requestId && requestId!=='') openRequestDetail(requestId);
}

async function markAllRead(){
  await sb.from('lc_notifications').update({is_read:true}).eq('to_role',currentUser.role);
  loadNotifications();
  renderNotifPanel();
}

async function sendNotification(toRole, title, body, requestId){
  await sb.from('lc_notifications').insert({to_role:toRole, title, body, request_id:requestId, is_read:false});
}

async function sendAuthEmail(reqId){
  const {data:req} = await sb.from('lc_requests').select('*').eq('id',reqId).single();
  if(!req){ showAlert('تعذر تحميل الطلب','error'); return; }

  const {data:settings} = await sb.from('lc_settings').select('*').single();
  if(!settings||!settings.email_to){
    showAlert('يرجى إعداد إيميل المسؤول أولاً في صفحة الإعدادات','error');
    navigate('settings');
    return;
  }

  showAlert('⏳ جاري إعداد الإيميل...','info');

  // Generate signed URLs for all documents
  const docUrls = req.doc_urls||{};
  let docsHtml = '';
  for(const [name, path] of Object.entries(docUrls)){
    const {data:signed} = await sb.storage.from('Documents').createSignedUrl(path, 604800);
    if(signed && signed.signedUrl){
      docsHtml += '<div style="margin-bottom:10px;padding:10px 14px;background:#f0f1f5;border-radius:6px;display:flex;justify-content:space-between;align-items:center">'
        + '<span style="font-weight:500">📄 ' + name + '</span>'
        + '<a href="' + signed.signedUrl + '" style="background:#3d35c4;color:#fff;padding:6px 14px;border-radius:4px;text-decoration:none;font-size:13px">فتح المستند</a>'
        + '</div>';
    }
  }
  if(!docsHtml) docsHtml = '<p style="color:#999">لم يتم إرفاق مستندات</p>';

  const templateParams = {
    to_email: settings.email_to,
    cc_email: settings.email_cc||'',
    to_name: settings.manager_name||'المسؤول',
    client_name: req.client_name||'',
    client_id: req.client_id||'',
    client_phone: req.client_phone||'',
    client_city: req.client_city||'',
    service_order: req.service_order||'',
    car_plate: req.car_plate||'',
    car_model: req.car_model||'',
    delivery_date: req.delivery_date||'',
    delivery_km: (req.delivery_km||0).toLocaleString()+' كم',
    documents_links: docsHtml||'<p>لا توجد مستندات مرفقة</p>',
    sent_by: currentUser.name,
    sent_date: new Date().toLocaleDateString('ar-SA-u-nu-latn')
  };

  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, templateParams);
    showAlert('✅ تم إرسال التفويض بنجاح إلى '+settings.email_to,'success');

async function saveDraft(){
  const client = document.getElementById('f_client')?.value.trim();
  const phone  = document.getElementById('f_phone')?.value.trim();
  const carVal = document.getElementById('f_car')?.value;
  const so     = document.getElementById('f_so')?.value.trim();

  if(!client){ showAlert('يرجى إدخال اسم العميل على الأقل','error'); return; }

  const [carId, carPlate, carModel, carYear] = (carVal||'|||').split('|');

  // Upload any available files
  const docNames = {'doc1':'أمر الشغل','doc2':'هوية العميل','doc3':'رخصة سير العميل','doc4':'رخصة سير المركبة','doc5':'إثبات عدم مخالفات','doc6':'نموذج التفويض'};
  const uploadedDocs = [];
  const uploadedUrls = {};

  for(const docId of ['doc1','doc2','doc3','doc4','doc5','doc6']){
    const file = document.getElementById(docId)?.files[0];

    const soVal = so||'DRAFT';

    if(upErr){ showAlert('خطأ في رفع '+docNames[docId]+': '+upErr.message,'error'); return; }
    uploadedDocs.push(docNames[docId]);
    uploadedUrls[docNames[docId]] = fileName;
  }

  const payload = {
    client_name: client,
    client_id: document.getElementById('f_id')?.value||'',
    client_phone: phone||'',
    client_city: document.getElementById('f_city')?.value||'',
    service_order: so||'',

    delivery_km: parseInt(document.getElementById('f_km')?.value)||0,
    delivery_fuel: parseInt(document.getElementById('f_fuel')?.value)||0,
    notes: document.getElementById('f_notes')?.value||'',
    docs: uploadedDocs,
    doc_urls: uploadedUrls,
    status: 'draft',
    created_by: currentUser.username,
    created_by_name: currentUser.name,
    workflow: [{step:'created', by:currentUser.name, at:new Date().toISOString(), note:'تم الحفظ كمسودة'}]
  };

  // Mark car as busy if selected
  if(carId) await sb.from('lc_cars').update({status:'busy', assigned_to:client}).eq('id', carId);

  const {error} = await sb.from('lc_requests').insert(payload);
  if(error){ showAlert('خطأ في الحفظ: '+error.message,'error'); return; }

  showAlert('تم حفظ الطلب كمسودة ✓ — يمكنك إكمال المستندات لاحقاً','success');

async function resubmitRequest(reqId){
  const {data:req} = await sb.from('lc_requests').select('*').eq('id',reqId).single();
  if(!req){ showAlert('خطأ في تحميل الطلب','error'); return; }

  const client = document.getElementById('e_client')?.value.trim();
  const phone  = document.getElementById('e_phone')?.value.trim();
  const carVal = document.getElementById('e_car')?.value;
  const so     = document.getElementById('e_so')?.value.trim();
  if(!client||!phone||!so){ showAlert('يرجى ملء الحقول الإلزامية','error'); return; }

  const [carId, carPlate, carModel, carYear] = carVal.split('|');
  const docNames = ['أمر الشغل','هوية العميل','رخصة سير العميل','رخصة سير المركبة','إثبات عدم مخالفات','نموذج التفويض'];

  // Upload new files if provided, keep old ones otherwise
  let docUrls = {...(req.doc_urls||{})};
  let docs = [...(req.docs||[])];
  const progress = document.createElement('div');
  progress.textContent = '⏳ جاري رفع الملفات...';
  progress.style.cssText = 'color:var(--blue);font-size:13px;margin-bottom:8px';
  document.querySelector('.flex.gap-2').before(progress);

  for(let i=0;i<docNames.length;i++){
    const file = document.getElementById('edoc'+(i+1))?.files[0];
    if(!file) continue;
    const fileName = so+'_doc'+(i+1)+'_'+Date.now()+'.pdf';
    const {error:upErr} = await sb.storage.from('Documents').upload(fileName, file, {upsert:true});
    if(upErr){ showAlert('خطأ في رفع '+docNames[i]+': '+upErr.message,'error'); return; }
    docUrls[docNames[i]] = fileName;
    if(!docs.includes(docNames[i])) docs.push(docNames[i]);
  }

  // Update the existing request
  const wf = req.workflow||[];
  wf.push({step:'resubmitted', by:currentUser.name, at:new Date().toISOString(), note:'تم التعديل وإعادة الرفع'});

  const {error} = await sb.from('lc_requests').update({
    client_name: client,
    client_id: document.getElementById('e_id')?.value||'',
    client_phone: phone,
    client_city: document.getElementById('e_city')?.value||'',
    service_order: so,
    maintenance_car: document.getElementById('e_mcar')?.value||'',
    car_id: carId, car_plate: carPlate, car_model: carModel,
    delivery_date: document.getElementById('e_del')?.value||'',
    return_date: document.getElementById('e_ret')?.value||'',
    delivery_km: parseInt(document.getElementById('e_km')?.value)||0,
    delivery_fuel: parseInt(document.getElementById('e_fuel')?.value)||0,
    notes: document.getElementById('e_notes')?.value||'',
    docs, doc_urls: docUrls,
    status: 'pending_audit',
    workflow: wf
  }).eq('id', reqId);

  if(error){ showAlert('خطأ في الحفظ: '+error.message,'error'); return; }

  // Free old car if changed
  if(carId !== req.car_id){
    await sb.from('lc_cars').update({status:'available', assigned_to:null}).eq('id', req.car_id);
    await sb.from('lc_cars').update({status:'busy', assigned_to:client}).eq('id', carId);
  }

  await sendNotification('auditor','📋 طلب معدّل بانتظار تدقيقك','تم تعديل طلب العميل '+client+' — '+so+' وإعادة رفعه',reqId);
  showAlert('تم إعادة رفع الطلب للتدقيق بنجاح ✓','success');
  navigate('my_requests');
}

  const templateParams = {

    // Log email sent
    const wf2 = wf;
    wf2.push({step:'email_sent', by:currentUser.name, at:new Date().toISOString(), note:'تم إرسال التفويض بالإيميل إلى '+settings.email_to});
    await sb.from('lc_requests').update({workflow:wf2}).eq('id',id);
    showAlert('✅ تمت الموافقة وإرسال التفويض بالإيميل بنجاح!','success');
  } catch(err){
    showAlert('✅ تمت الموافقة — خطأ في الإيميل: '+JSON.stringify(err),'error');
  }
  navigate(currentPage);
}

// ── STATUS BADGE ──
function statusBadge(status){
  const map = {
    draft:              ['gray','مسودة'],
    pending_audit:      ['amber','⏳ بانتظار التدقيق'],
    pending_supervisor: ['blue','🔍 بانتظار المشرف'],
    pending_manager:    ['purple','👤 بانتظار المدير'],
    approved:           ['green','✓ معتمد'],
    completed:          ['green','✅ مكتمل'],
    closed:             ['gray','🔒 مغلق'],
    pending_close:      ['amber','⏳ بانتظار تأكيد الإغلاق'],
    rejected:           ['red','✕ مرفوض'],
    staff:              ['gray','موظف'],
    auditor:            ['blue','مدقق'],
    supervisor:         ['amber','مشرف'],
    manager:            ['purple','مدير'],
  };
  const [cls,lbl] = map[status]||['gray',status];
  return '<span class="badge '+cls+'">'+lbl+'</span>';
}

// ── MANAGE CARS ──
async function renderManageCars(c){
  const {data:cars} = await sb.from('lc_cars').select('*').order('created_at',{ascending:false});
  c.innerHTML = '<div class="flex justify-between items-center" style="margin-bottom:20px"><div class="page-title" style="margin:0">🚗 إدارة السيارات</div><button class="btn primary" onclick="openAddCar()">➕ إضافة سيارة</button></div>'
  + '<div class="table-card"><div class="table-wrap"><table>'
  + '<thead><tr><th>اللوحة</th><th>الموديل</th><th>اللون</th><th>العداد</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody>'
  + (cars||[]).map(car=>{
    const statusCls = car.status==='available'?'green':car.status==='busy'?'red':'amber';
    const statusTxt = car.status==='available'?'متاحة':car.status==='busy'?'مُسلَّمة':'صيانة';
    return '<tr>'
    +'<td><strong>'+car.plate+'</strong></td>'
    +'<td>'+(car.model||'—')+'</td>'
    +'<td>'+(car.color||'—')+'</td>'
    +'<td>'+(car.km||0).toLocaleString()+' كم</td>'
    +'<td><span class="badge '+statusCls+'">'+statusTxt+'</span></td>'
    +'<td><button class="btn sm" onclick="openEditCar(\'' + car.id + '\')">✏️ تعديل</button></td>'
    +'</tr>';
  }).join('')
  + '</tbody></table></div></div>';
}

async function openEditCar(carId){
  const {data:car} = await sb.from('lc_cars').select('*').eq('id',carId).single();
  if(!car) return;
  document.getElementById('modal-area').innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><span class="modal-title">✏️ تعديل السيارة</span><button class="close-btn" onclick="closeModal()">×</button></div>'
  + '<div class="form-group"><label class="form-label">رقم اللوحة *</label><input class="form-control" id="ec_plate" value="'+car.plate+'"></div>'
  + '<div class="form-row"><div class="form-group"><label class="form-label">الموديل *</label><input class="form-control" id="ec_model" value="'+(car.model||'')+'"></div><div class="form-group"><label class="form-label">اللون</label><input class="form-control" id="ec_color" value="'+(car.color||'')+'"></div></div>'
  + '<div class="form-row"><div class="form-group"><label class="form-label">العداد (كم)</label><input class="form-control" id="ec_km" type="number" value="'+(car.km||0)+'"></div>'
    + '<div class="form-group"><label class="form-label">سنة الصنع</label><input class="form-control" id="ec_year" type="number" value="'+(car.year||'')+'" placeholder="2023"></div>'
  + '<div class="form-group"><label class="form-label">الحالة</label><select class="form-control" id="ec_status"><option value="available" '+(car.status==='available'?'selected':'')+'>متاحة</option><option value="busy" '+(car.status==='busy'?'selected':'')+'>مُسلَّمة</option><option value="maintenance" '+(car.status==='maintenance'?'selected':'')+'>صيانة</option></select></div></div>'
  + '<div class="form-actions"><button class="btn primary" onclick="updateCar(\'' + carId + '\')">💾 حفظ</button><button class="btn danger" onclick="deleteCar(\'' + carId + '\')">🗑️ حذف</button><button class="btn" onclick="closeModal()">إلغاء</button></div>'
  + '</div></div>';
}

async function updateCar(carId){
  const plate = document.getElementById('ec_plate')?.value.trim();
  if(!plate){showAlert('يرجى إدخال رقم اللوحة','error');return;}
  const {error} = await sb.from('lc_cars').update({
    plate, model:document.getElementById('ec_model')?.value||'',
    color:document.getElementById('ec_color')?.value||'',
    km:parseInt(document.getElementById('ec_km')?.value)||0,
    year:parseInt(document.getElementById('ec_year')?.value)||null,
    status:document.getElementById('ec_status')?.value
  }).eq('id',carId);
  if(error){showAlert('خطأ: '+error.message,'error');return;}
  closeModal(); showAlert('تم تحديث السيارة ✓','success'); navigate('manage_cars');
}

async function deleteCar(carId){
  if(!confirm('هل تريد حذف هذه السيارة؟')) return;
  const {error} = await sb.from('lc_cars').delete().eq('id',carId);
  if(error){showAlert('خطأ في الحذف','error');return;}
  closeModal(); showAlert('تم حذف السيارة ✓','success'); navigate('manage_cars');
}

// ── USERS ADMIN ──
async function renderUsers(c){
  if(!['manager','supervisor'].includes(currentUser.role)){ c.innerHTML='<div class="empty">غير مصرح</div>'; return; }
  const {data:users} = await sb.from('lc_users').select('*').order('created_at');
  c.innerHTML = '<div class="flex justify-between items-center" style="margin-bottom:20px"><div class="page-title" style="margin:0">👥 إدارة المستخدمين</div><button class="btn primary" onclick="openUserModal()">➕ مستخدم جديد</button></div>'
  + '<div class="table-card"><div class="table-wrap"><table>'
  + '<thead><tr><th>الاسم</th><th>المستخدم</th><th>الدور</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody>'
  + (users||[]).map(u=>{
    return '<tr>'
    +'<td><strong>'+u.name+'</strong></td>'
    +'<td><code style="background:var(--bg3);padding:2px 8px;border-radius:4px;font-size:12px">'+u.username+'</code></td>'
    +'<td>'+statusBadge(u.role)+'</td>'
    +'<td><span class="badge '+(u.is_active?'green':'gray')+'">'+(u.is_active?'نشط':'موقوف')+'</span></td>'
    +'<td><div class="flex gap-2">'
    +'<button class="btn sm" onclick="openUserModal(\'' + u.id + '\')">✏️</button>'
    +'<button class="btn sm danger" onclick="deleteUser(\'' + u.id + '\',\'' + u.username + '\')">🗑️</button>'
    +'</div></td>'
    +'</tr>';
  }).join('')
  + '</tbody></table></div></div>';
}

async function openUserModal(userId){
  let user = null;
  if(userId){ const {data} = await sb.from('lc_users').select('*').eq('id',userId).single(); user=data; }
  const rolesHtml = ['staff','auditor','supervisor','manager'].map(r=>{
    const sel = user&&user.role===r ? 'selected' : '';
    const lbl = {staff:'موظف',auditor:'مدقق',supervisor:'مشرف',manager:'مدير'}[r];
    return '<option value="'+r+'" '+sel+'>'+lbl+'</option>';
  }).join('');
  document.getElementById('modal-area').innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'
  + '<div class="modal-header"><span class="modal-title">'+(user?'تعديل مستخدم':'مستخدم جديد')+'</span><button class="close-btn" onclick="closeModal()">×</button></div>'
  + '<div class="form-row">'
  + '<div class="form-group"><label class="form-label">الاسم *</label><input class="form-control" id="u_name" value="'+(user?user.name||'':'')+'"></div>'
  + '<div class="form-group"><label class="form-label">اسم المستخدم *</label><input class="form-control" id="u_username" value="'+(user?user.username||'':'')+'" ></div>'
  + '</div>'
  + '<div class="form-row">'
  + '<div class="form-group"><label class="form-label">كلمة المرور</label><input class="form-control" id="u_pass" type="password" placeholder="'+(user?'اتركها للإبقاء':'كلمة المرور')+'" ></div>'
  + '<div class="form-group"><label class="form-label">الدور</label><select class="form-control" id="u_role">'+rolesHtml+'</select></div>'
  + '</div>'
  + '<div class="form-group"><label class="form-label">الحالة</label><select class="form-control" id="u_active"><option value="true" '+(!user||user.is_active?'selected':'')+'>نشط</option><option value="false" '+(user&&!user.is_active?'selected':'')+'>موقوف</option></select></div>'
  + '<div class="form-actions"><button class="btn primary" onclick="saveUser(\'' + (userId||'') + '\')">💾 حفظ</button><button class="btn" onclick="closeModal()">إلغاء</button></div>'
  + '</div></div>';
}


async function saveUser(userId){
  const name=document.getElementById('u_name')?.value.trim();
  const username=document.getElementById('u_username')?.value.trim();
  const pass=document.getElementById('u_pass')?.value;
  const role=document.getElementById('u_role')?.value;
  const is_active=document.getElementById('u_active')?.value==='true';
  if(!name||!username){showAlert('يرجى ملء الاسم واسم المستخدم','error');return;}
  if(!userId&&!pass){showAlert('يرجى إدخال كلمة المرور','error');return;}
  const payload={name,role,is_active,username};
  if(pass) payload.password=pass;
  const {error}=userId ? await sb.from('lc_users').update(payload).eq('id',userId) : await sb.from('lc_users').insert({...payload,username});
  if(error){showAlert('خطأ: '+error.message,'error');return;}
  closeModal(); showAlert(userId?'تم التحديث ✓':'تم الإضافة ✓','success'); navigate('users');
}

async function deleteUser(userId,username){
  if(!confirm('حذف المستخدم '+username+'؟')) return;
  await sb.from('lc_users').delete().eq('id',userId);
  showAlert('تم الحذف ✓','success'); navigate('users');
}



function filterRequests(){
  const search = (document.getElementById('search-req')?.value||'').toLowerCase().trim();
  const status = document.getElementById('filter-status')?.value||'';
  const rows = document.querySelectorAll('.req-row');
  let visible = 0;
  rows.forEach(row=>{
    const info = (row.dataset.info||'').toLowerCase().split('|');
    const client = info[0]||'';
    const so = info[1]||'';
    const rowStatus = info[2]||'';
    const matchSearch = !search || client.includes(search) || so.includes(search);
    const matchStatus = !status || rowStatus === status;
    row.style.display = (matchSearch && matchStatus) ? '' : 'none';
    if(matchSearch && matchStatus) visible++;
  });
}

function showAlert(msg, type='success'){
  const a = document.getElementById('alert-area');
  if(!a) return;
  a.innerHTML = '<div class="alert '+type+'">'+msg+'</div>';
  setTimeout(()=>{if(a) a.innerHTML='';}, 4000);
}

function closeModal(){
  document.getElementById('modal-area').innerHTML='';
}

// Enter key on login
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('login-screen').style.display!=='none') doLogin();
});
</script>
